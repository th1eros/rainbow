<div class="blue-card" style="max-width:600px;min-height:100%;">
    <div class="card-header"><h3>PROFILE</h3><span class="panel-tag">SETTINGS</span></div>
    <div id="profile-info" style="margin-bottom:20px;">Loading...</div>
    <div class="blue-card" style="margin-bottom:16px;">
        <h3 style="font-size:11px;font-weight:700;color:var(--text-white);margin-bottom:12px;">EDIT PROFILE</h3>
        <form id="profile-form">
            <div class="form-group"><label>EMAIL</label><input type="email" id="profileEmail" class="form-control"></div>
            <div class="form-group"><label>FULL NAME</label><input type="text" id="profileName" class="form-control"></div>
            <button type="submit" class="action-btn btn-primary" style="width:auto;">SAVE</button>
        </form>
        <div id="profile-result" class="mt-2" style="font-size:11px;"></div>
    </div>
    <div class="blue-card" style="margin-bottom:16px;">
        <h3 style="font-size:11px;font-weight:700;color:var(--text-white);margin-bottom:12px;">CHANGE PASSWORD</h3>
        <form id="password-form">
            <div class="form-group"><label>CURRENT PASSWORD</label><input type="password" id="currentPassword" class="form-control" required></div>
            <div class="form-group"><label>NEW PASSWORD</label><input type="password" id="newPassword" class="form-control" required></div>
            <button type="submit" class="action-btn btn-primary" style="width:auto;">CHANGE</button>
        </form>
        <div id="password-result" class="mt-2" style="font-size:11px;"></div>
    </div>
    <div class="blue-card">
        <h3 style="font-size:11px;font-weight:700;color:var(--text-white);margin-bottom:12px;">ACTIVE SESSIONS</h3>
        <div id="sessions-list">Loading...</div>
    </div>
</div>

<script>
    var headers = function() { return { 'Authorization': 'Bearer ' + localStorage.getItem('abitat_token'), 'Content-Type': 'application/json' }; };
    function loadProfile() {
        fetch('http://localhost:5073/api/auth/me', { headers: headers() })
            .then(r => r.json())
            .then(d => {
                if (d.success && d.data) {
                    document.getElementById('profile-info').innerHTML = '<div style="display:flex;gap:16px;align-items:center;"><div style="width:48px;height:48px;background:var(--accent-blue);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;">' + (d.data.username || 'U')[0].toUpperCase() + '</div><div><strong style="color:var(--text-white);">' + d.data.username + '</strong><br><small style="color:var(--text-muted);">ID: ' + d.data.userId + '</small></div></div>';
                    document.getElementById('profileEmail').value = d.data.email || '';
                    document.getElementById('profileName').value = d.data.fullName || '';
                }
            });
    }
    function loadSessions() {
        fetch('http://localhost:5073/api/auth/sessions', { headers: headers() })
            .then(r => r.json())
            .then(d => {
                var list = document.getElementById('sessions-list');
                if (d.success && d.data && d.data.length > 0) {
                    list.innerHTML = d.data.map(function(s) {
                        return '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px;background:var(--bg-inner);border:1px solid var(--border-color);border-radius:var(--radius-sm);margin-bottom:6px;"><div><strong>' + s.username + '</strong><br><small style="color:var(--text-muted);">' + s.service + ':' + s.scope + ' | ' + new Date(s.authorizedAt).toLocaleString('pt-BR') + '</small></div><button class="action-btn" style="width:auto;padding:4px 8px;font-size:10px;" onclick="revokeSession(\'' + s.id + '\')">REVOKE</button></div>';
                    }).join('');
                } else { list.innerHTML = '<p style="color:var(--text-muted);">No active sessions</p>'; }
            });
    }
    document.getElementById('profile-form').addEventListener('submit', function(e) {
        e.preventDefault();
        fetch('http://localhost:5073/api/auth/me', { method: 'PUT', headers: headers(), body: JSON.stringify({ email: document.getElementById('profileEmail').value, fullName: document.getElementById('profileName').value }) })
            .then(r => r.json())
            .then(d => { document.getElementById('profile-result').innerHTML = d.success ? '<div style="color:var(--accent-green);font-size:11px;">Profile updated!</div>' : '<div style="color:var(--accent-red);font-size:11px;">Error</div>'; });
    });
    document.getElementById('password-form').addEventListener('submit', function(e) {
        e.preventDefault();
        fetch('http://localhost:5073/api/auth/change-password', { method: 'POST', headers: headers(), body: JSON.stringify({ currentPassword: document.getElementById('currentPassword').value, newPassword: document.getElementById('newPassword').value }) })
            .then(r => r.json())
            .then(d => { document.getElementById('password-result').innerHTML = d.success ? '<div style="color:var(--accent-green);font-size:11px;">Password changed!</div>' : '<div style="color:var(--accent-red);font-size:11px;">Error</div>'; });
    });
    function revokeSession(id) { fetch('http://localhost:5073/api/auth/sessions/' + id, { method: 'DELETE', headers: headers() }).then(function() { loadSessions(); }); }
    loadProfile();
    loadSessions();
</script>
