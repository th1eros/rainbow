<div class="blue-card" style="min-height:100%;">
    <div class="card-header"><h3>NOTIFICATIONS</h3><span class="panel-tag" id="unread-badge">0 UNREAD</span></div>
    <div class="blue-stats-strip">
        <div class="strip-card"><span class="strip-label">TOTAL</span><span class="strip-value" id="stat-total">--</span><div class="progress-bar"><div class="progress-fill" style="width:100%;background:var(--accent-blue);"></div></div></div>
        <div class="strip-card"><span class="strip-label">UNREAD</span><span class="strip-value" id="stat-unread">--</span><div class="progress-bar"><div class="progress-fill" style="width:100%;background:var(--accent-red);"></div></div></div>
        <div class="strip-card" onclick="markAllAsRead()" style="cursor:pointer;"><span class="strip-label">MARK ALL READ</span><span class="strip-value">OK</span><div class="progress-bar"><div class="progress-fill" style="width:100%;background:var(--accent-green);"></div></div></div>
    </div>
    <table class="blue-table" style="margin-top:16px;">
        <thead><tr><th>ID</th><th>TITLE</th><th>TYPE</th><th>DATE</th><th>STATUS</th><th>ACTIONS</th></tr></thead>
        <tbody id="notifications-list"><tr><td colspan="6" style="text-align:center;padding:20px;">Loading...</td></tr></tbody>
    </table>
</div>

<script>
    var headers = function() { return { 'Authorization': 'Bearer ' + localStorage.getItem('abitat_token') }; };
    function loadNotifications() {
        fetch('http://localhost:5073/api/Notification', { headers: headers() })
            .then(r => r.json())
            .then(d => {
                var list = document.getElementById('notifications-list');
                if (d.success && d.data && d.data.length > 0) {
                    var unread = d.data.filter(function(n) { return !n.isRead; }).length;
                    document.getElementById('stat-total').textContent = d.data.length;
                    document.getElementById('stat-unread').textContent = unread;
                    document.getElementById('unread-badge').textContent = unread + ' UNREAD';
                    list.innerHTML = d.data.map(function(n) {
                        return '<tr style="' + (!n.isRead ? 'background:rgba(107,164,214,0.05);' : '') + '"><td>#' + n.id + '</td><td>' + (n.title || 'N/A') + '</td><td>' + (n.type || 'N/A') + '</td><td>' + (n.createdAt ? new Date(n.createdAt).toLocaleString('pt-BR') : 'N/A') + '</td><td>' + (n.isRead ? '<span style="color:var(--text-muted);">READ</span>' : '<span style="color:var(--accent-blue);">NEW</span>') + '</td><td>' +
                            (!n.isRead ? '<button class="action-btn" onclick="markAsRead(' + n.id + ')">READ</button> ' : '') +
                            '<button class="action-btn" onclick="deleteNotif(' + n.id + ')">DEL</button></td></tr>';
                    }).join('');
                } else { list.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:20px;">No notifications</td></tr>'; }
            });
    }
    function markAsRead(id) { fetch('http://localhost:5073/api/Notification/' + id + '/read', { method: 'PATCH', headers: headers() }).then(function() { loadNotifications(); }); }
    function markAllAsRead() { fetch('http://localhost:5073/api/Notification/read-all', { method: 'PATCH', headers: headers() }).then(function() { loadNotifications(); }); }
    function deleteNotif(id) { fetch('http://localhost:5073/api/Notification/' + id, { method: 'DELETE', headers: headers() }).then(function() { loadNotifications(); }); }
    loadNotifications();
</script>
