name: Main

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [Blue, Red, Violet, Silver]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: dotnet restore Rapsodia.${{ matrix.project }}/Rapsodia.${{ matrix.project }}.csproj
      - name: Build
        run: dotnet build Rapsodia.${{ matrix.project }}/Rapsodia.${{ matrix.project }}.csproj --configuration Release --no-restore
      - name: Publish
        run: dotnet publish Rapsodia.${{ matrix.project }}/Rapsodia.${{ matrix.project }}.csproj -c Release -o publish/${{ matrix.project }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-${{ matrix.project }}
          path: publish/${{ matrix.project }}

  deploy:
    needs: build-backend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to OCI
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            cd /var/www/abitab
            git pull origin main
            sudo systemctl restart abitab-*
            sudo nginx -s reload