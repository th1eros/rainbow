name: Main CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore all
        run: |
          dotnet restore Rapsodia.Blue/Rapsodia.Blue.csproj
          dotnet restore Rapsodia.Red/Rapsodia.Red.csproj
          dotnet restore Rapsodia.Violet/Rapsodia.Violet.csproj
          dotnet restore Rapsodia.Silver/Rapsodia.Silver.csproj
      - name: Build all
        run: |
          dotnet build Rapsodia.Blue/Rapsodia.Blue.csproj --configuration Release --no-restore
          dotnet build Rapsodia.Red/Rapsodia.Red.csproj --configuration Release --no-restore
          dotnet build Rapsodia.Violet/Rapsodia.Violet.csproj --configuration Release --no-restore
          dotnet build Rapsodia.Silver/Rapsodia.Silver.csproj --configuration Release --no-restore

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to OCI
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/abitab
            git pull origin main
            sudo systemctl restart abitab-*
            sudo nginx -s reload