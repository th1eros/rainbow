services:
  frontend:
    build: .
    image: frontend:latest
    ports:
      - "${PORT_START:-10001}:80"
      - "${PORT_START:-10001}:80"
      - "${PORT_START:-10001}:80"
      - "${PORT_START:-10001}:80"
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  app_net:
    external: true