services:
  rainbow:
    image: nginx:alpine
    volumes:
      - ./Rainbow:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - traefik-public
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.rainbow.rule=Host(`hml.abitab.com`)"
        - "traefik.http.routers.rainbow.entrypoints=web"
        - "traefik.http.services.rainbow.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  traefik-public:
    external: true