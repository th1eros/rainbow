name: malebolge-rainbow
services:
  frontend:
    image: nginx:alpine
    container_name: male-rainbow
    ports:
      - "8081:80"
    volumes:
      - .:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - malebolge_net
    restart: unless-stopped

networks:
  malebolge_net:
    external: true